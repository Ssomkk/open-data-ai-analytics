name: CI (self-hosted)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: [self-hosted, Windows, X64]

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    env:
      DATA_DIR: data/raw
      DB_PATH: data/nuclear_safety.db
      REPORTS_DIR: reports/lab1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Use system Python
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
          pip install pandas openpyxl requests scikit-learn seaborn matplotlib flask

      - name: Prepare environment
        run: |
          New-Item -ItemType Directory -Force -Path $env:DATA_DIR
          New-Item -ItemType Directory -Force -Path "$env:REPORTS_DIR/figures"
          New-Item -ItemType Directory -Force -Path "artifacts/${{ matrix.module }}"

      - name: Run module
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          function Invoke-Module {
            param (
              [string]$ModuleName,
              [string]$ScriptPath
            )

            $LogPath = "artifacts/${{ matrix.module }}/$ModuleName.log"

            Write-Host "Running $ModuleName`: $ScriptPath"
            python $ScriptPath *> $LogPath

            if ($LASTEXITCODE -ne 0) {
              Write-Host "Error while running $ModuleName"
              Get-Content $LogPath
              exit 1
            }
          }

          Write-Host "Processing module: ${{ matrix.module }}"

          if ("${{ matrix.module }}" -ne "data_load") {
            if (-Not (Test-Path "$env:DATA_DIR/nuclear