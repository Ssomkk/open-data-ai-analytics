name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Який модуль запустити"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas openpyxl requests scikit-learn seaborn matplotlib

      - name: Prepare environment
        run: |
          mkdir -p data/raw
          mkdir -p reports/lab1/figures
          mkdir -p artifacts/${{ matrix.module }}

      - name: Run module
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          echo "Processing module: ${{ matrix.module }}"

          if [ "${{ matrix.module }}" != "data_load" ]; then
            echo "Pre-loading data..."
            python data_load/app.py
          fi

          if [ "${{ matrix.module }}" = "data_research" ] || [ "${{ matrix.module }}" = "visualization" ]; then
            echo "Pre-cleaning data..."
            python data_quality_analysis/app.py
          fi

          echo "Executing ${{ matrix.module }}..."

          case "${{ matrix.module }}" in
            data_load)
              python data_load/app.py > artifacts/${{ matrix.module }}/output.log 2>&1
              ;;
            data_quality_analysis)
              python data_quality_analysis/app.py > artifacts/${{ matrix.module }}/output.log 2>&1
              ;;
            data_research)
              python data_research/app.py > artifacts/${{ matrix.module }}/output.log 2>&1
              ;;
            visualization)
              python visualization/app.py > artifacts/${{ matrix.module }}/output.log 2>&1
              ;;
            *)
              echo "Unknown module: ${{ matrix.module }}" > artifacts/${{ matrix.module }}/output.log
              exit 1
              ;;
          esac

          if [ $? -ne 0 ]; then
            echo "Error details:"
            cat artifacts/${{ matrix.module }}/output.log
            exit 1
          fi

      - name: Upload artifacts
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module) }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          if-no-files-found: warn
          path: |
            artifacts/${{ matrix.module }}
            reports/lab1/figures/*.png
            data/raw/*.csv
            data/*.db