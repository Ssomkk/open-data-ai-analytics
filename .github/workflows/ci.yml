name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Який модуль запустити"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Встановлення необхідних бібліотек для роботи з Excel та графіками
          pip install pandas openpyxl requests scikit-learn seaborn matplotlib

      - name: Prepare environment
        run: |
          # Створення необхідних папок перед запуском скриптів
          mkdir -p data/raw
          mkdir -p reports/lab1/figures
          mkdir -p artifacts/${{ matrix.module }}

      - name: Run module
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          echo "Processing module: ${{ matrix.module }}"
          
          # Оскільки кожен job у матриці ізольований, забезпечуємо наявність даних:
          # Якщо це не data_load, спочатку завантажуємо дані
          if [ "${{ matrix.module }}" != "data_load" ]; then
            echo "Pre-loading data..."
            python src/data_load.py
          fi
          
          # Якщо це аналіз або візуалізація, забезпечуємо наявність чистих даних
          if [ "${{ matrix.module }}" == "data_research" ] || [ "${{ matrix.module }}" == "visualization" ]; then
            echo "Pre-cleaning data..."
            python src/data_quality_analysis.py
          fi

          # Запуск цільового модуля
          echo "Executing ${{ matrix.module }}..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}/output.log 2>&1 || {
            echo "Error details:"
            cat artifacts/${{ matrix.module }}/output.log
            exit 1
          }

      - name: Upload artifacts
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module) }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: |
            artifacts/${{ matrix.module }}
            reports/lab1/figures/*.png
            data/raw/*.csv