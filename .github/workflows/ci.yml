name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    env:
      DATA_DIR: data/raw
      DB_PATH: data/nuclear_safety.db
      REPORTS_DIR: reports/lab1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas openpyxl requests scikit-learn seaborn matplotlib flask

      - name: Prepare environment
        run: |
          mkdir -p "$DATA_DIR"
          mkdir -p "$REPORTS_DIR/figures"
          mkdir -p "artifacts/${{ matrix.module }}"

      - name: Run module
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}
        run: |
          set -e

          echo "Processing module: ${{ matrix.module }}"

          run_and_log() {
            local module_name="$1"
            local script_path="$2"
            local log_path="artifacts/${{ matrix.module }}/${module_name}.log"

            echo "Running ${module_name}: ${script_path}"
            python "${script_path}" > "${log_path}" 2>&1 || {
              echo "Error while running ${module_name}"
              cat "${log_path}"
              exit 1
            }
          }

          if [ "${{ matrix.module }}" != "data_load" ]; then
            if [ ! -f "$DATA_DIR/nuclear_safety_q4_2025.xlsx" ]; then
              run_and_log "preload_data" "src/data_load/app.py"
            fi
          fi

          if [ "${{ matrix.module }}" = "data_research" ] || [ "${{ matrix.module }}" = "visualization" ]; then
            if [ ! -f "$DATA_DIR/clean_data.csv" ]; then
              run_and_log "preclean_data" "src/data_quality_analysis/app.py"
            fi
          fi

          case "${{ matrix.module }}" in
            data_load)
              run_and_log "data_load" "src/data_load/app.py"
              ;;
            data_quality_analysis)
              run_and_log "data_quality_analysis" "src/data_quality_analysis/app.py"
              ;;
            data_research)
              run_and_log "data_research" "src/data_research/app.py"
              ;;
            visualization)
              run_and_log "visualization" "src/visualization/app.py"
              ;;
            *)
              echo "Unknown module: ${{ matrix.module }}"
              exit 1
              ;;
          esac

      - name: Upload artifacts
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module) }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          if-no-files-found: warn
          path: |
            artifacts/${{ matrix.module }}
            data/raw/*.xlsx
            data/raw/*.csv
            data/*.db
            reports/lab1/*.json
            reports/lab1/figures/*.png