<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Open Data AI Analytics — аналіз екологічної та радіаційної обстановки в зонах АЕС України" />
  <title>{% block title %}Nuclear Safety Analytics{% endblock %} | Open Data AI</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ── Animated background ───────────────────────────────────────────────── -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── Navigation ────────────────────────────────────────────────────────── -->
  <nav class="navbar" id="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">
      <span class="brand-icon">⚛</span>
      <span class="brand-text">Nuclear<span class="brand-accent">Analytics</span></span>
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Відкрити меню">☰</button>

    <ul class="nav-links" id="navLinks">
      <li><a href="{{ url_for('index') }}"           class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">🏠 Головна</a></li>
      <li><a href="{{ url_for('data_page') }}"       class="nav-link {% if request.endpoint == 'data_page' %}active{% endif %}">📊 Дані</a></li>
      <li><a href="{{ url_for('quality_page') }}"    class="nav-link {% if request.endpoint == 'quality_page' %}active{% endif %}">🔍 Якість</a></li>
      <li><a href="{{ url_for('research_page') }}"   class="nav-link {% if request.endpoint == 'research_page' %}active{% endif %}">🧬 Дослідження</a></li>
      <li><a href="{{ url_for('visualizations_page') }}" class="nav-link {% if request.endpoint == 'visualizations_page' %}active{% endif %}">📈 Візуалізація</a></li>
    </ul>
  </nav>

  <!-- ── Page content ──────────────────────────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ────────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <p>
      <span class="footer-brand">⚛ Nuclear Safety Analytics</span>
      &nbsp;·&nbsp; Дані: <a href="https://data.gov.ua" target="_blank" rel="noopener">data.gov.ua</a>
      &nbsp;·&nbsp; © 2026
    </p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
